version: '3.8'

services:
  # The React Frontend (Vite -> Nginx)
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

  # The GoLang Backend API & RCE Sandbox
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=host=db user=user password=password dbname=visual_algo port=5432 sslmode=disable
    volumes:
      # Mount docker socket so Go container can spawn Python/C++ sandbox containers
      - //var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy

  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=visual_algo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d visual_algo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
